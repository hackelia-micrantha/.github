name: "Feature request"
description: "Propose an enhancement or new capability"
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are welcome. Please focus on the problem, constraints, and tradeoffs.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? Who is it for?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What do you want to happen? Include UX/API sketch if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you consider? Why isn’t it enough?
    validations:
      required: false

  - type: textarea
    id: risks
    attributes:
      label: Risks / tradeoffs
      description: Security, performance, compatibility, operational concerns.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I checked existing issues and discussions for similar requests.
          required: true
