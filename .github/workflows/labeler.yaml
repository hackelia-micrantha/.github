name: labeler
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Add needs-triage
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: needs-triage
